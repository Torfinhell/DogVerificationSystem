defaults:
  - model: baseline
  - writer: wandb
  - metrics: basic
  - datasets: barkopedia
  - dataloader: basic
  - transforms: baseline
  - _self_

# Must match ``num_classes`` in mapping.json / label_map.json after building indices.
num_classes: 60

optimizer:
  _target_: torch.optim.Adam
  lr: 3e-4
  lr_loss: null # e.g. 1e-3 for AAM-Softmax embedding; null = same lr for model + loss params
lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.9
  step_size: ${trainer.epoch_len}
loss_function:
  _target_: src.loss.SoftmaxLoss
trainer:
  log_step: 50
  n_epochs: 100
  epoch_len: null
  device_tensors: ["spectral_feat", "labels"] # which tensors should be on device (ex. GPU)
  resume_from: null # null or path to the checkpoint dir with *.pth and config.yaml
  device: 'auto' # device name or "auto"
  allow_tf32: true # set false for stricter matmul precision on Ampere+; ignored on CPU
  amp:
    enabled: false # CUDA autocast for forward + loss (use bfloat16 on supported GPUs)
    dtype: bfloat16 # float16 | bfloat16
  compile:
    enabled: false
    call:
      _target_: torch.compile
      mode: default # default | reduce-overhead | max-autotune | max-autotune-no-cudagraphs
      fullgraph: false
      dynamic: false
      backend: inductor
  override: False # if True, will override the previous run with the same name
  monitor: "max test_MulticlassAccuracy" # "off" or "max/min metric_name", i.e. our goal is to maximize/minimize metric
  save_period: 5 # checkpoint each save_period epochs in addition to the best epoch
  early_stop: ${trainer.n_epochs} # epochs for early stopping
  save_dir: "saved"
  seed: 1
