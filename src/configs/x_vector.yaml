defaults:
  - model: x_vector
  - writer: wandb
  - metrics: basic
  - datasets: barkopedia
  - dataloader: basic
  - transforms: x_vector
  - batch_sampler: hpm
  - backends: cos  # Choose backend: cos, plda
  - _self_
sample_rate: 800
# Must match ``num_classes`` in mapping.json / label_map.json after building indices.
num_classes: 60
yandex_token: null
optimizer:
  _target_: torch.optim.Adam
  lr: 3e-4
  lr_loss: null # set when using AAM-Softmax (e.g. 1e-3 for embedding weights)
lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.9
  step_size: ${trainer.epoch_len}
loss_function:
  _target_: src.loss.AAMSoftmaxLoss
  embedding_dim: ${model.output_dim}
  num_speakers: ${num_classes}
  scale: 3
  margin: 0.1
  label_smoothing: 0.1
trainer:
  log_step: 50
  n_epochs: 100
  epoch_len: 300
  device_tensors: ["spectral_feat", "labels", "audio_lengths", "spectral_feat_lengths"] # which tensors should be on device (ex. GPU)
  resume_from: null # null or path to the checkpoint dir with *.pth and config.yaml
  device: 'auto' # device name or "auto"
  allow_tf32: true
  amp:
    enabled: false
    dtype: bfloat16
  compile:
    enabled: false
    call:
      _target_: torch.compile
      mode: default
      fullgraph: false
      dynamic: false
      backend: inductor
  override: False # if True, will override the previous run with the same name
  monitor: "max val_MulticlassAccuracy" # "off" or "max/min metric_name", i.e. our goal is to maximize/minimize metric
  save_period: 5 # checkpoint each save_period epochs in addition to the best epoch
  early_stop: ${trainer.n_epochs} # epochs for early stopping
  save_dir: "saved"
  seed: 1
