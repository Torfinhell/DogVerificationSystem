train: # metrics that are calculated during training
  - _target_: src.metrics.ClassificationMetric
    metric:
      _target_: torchmetrics.classification.MulticlassAccuracy
      num_classes: 60
      average: "macro"
    device: ${trainer.device}
    name: "TRAIN_MulticlassAccuracy"

  - _target_: src.metrics.ClassificationMetric
    metric:
      _target_: torchmetrics.classification.MulticlassPrecision
      num_classes: 60
      average: "macro"
    device: ${trainer.device}
    name: "TRAIN_MulticlassPrecision"

  - _target_: src.metrics.ClassificationMetric
    metric:
      _target_: torchmetrics.classification.MulticlassRecall
      num_classes: 60
      average: "macro"
    device: ${trainer.device}
    name: "TRAIN_MulticlassRecall"

inference: # metrics that are calculated during inference (eval)
  - _target_: src.metrics.ClassificationMetric
    metric:
      _target_: torchmetrics.classification.MulticlassAccuracy
      num_classes: 60
      average: "macro"
    device: ${trainer.device}
    name: "MulticlassAccuracy"

  - _target_: src.metrics.ClassificationMetric
    metric:
      _target_: torchmetrics.classification.MulticlassPrecision
      num_classes: 60
      average: "macro"
    device: ${trainer.device}
    name: "MulticlassPrecision"

  - _target_: src.metrics.ClassificationMetric
    metric:
      _target_: torchmetrics.classification.MulticlassRecall
      num_classes: 60
      average: "macro"
    device: ${trainer.device}
    name: "MulticlassRecall"

  - _target_: src.metrics.ConfusionMatrixMetric
    metric:
      _target_: torchmetrics.classification.ConfusionMatrix
      num_classes: 60
      task: "multiclass"
    device: ${trainer.device}
    name: "confusion_matrix"
